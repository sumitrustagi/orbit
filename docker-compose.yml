version: "3.9"

# ════════════════════════════════════════════════════════════════
# Orbit — Full Stack Docker Compose
# Services: web · worker · beat · db (PostgreSQL) · redis · nginx
# ════════════════════════════════════════════════════════════════

# Shared config block reused by web, worker and beat
x-orbit-common: &orbit-common
  build:
    context: .
    dockerfile: Dockerfile
    target: runtime
  image: orbit:latest
  env_file: .env
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped
  networks:
    - orbit-net

services:

  # ── PostgreSQL 16 ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       orbit
      POSTGRES_USER:     orbit
      POSTGRES_PASSWORD: orbit_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbit -d orbit"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orbit-net

  # ── Redis 7 ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - orbit-net

  # ── Gunicorn Web App ────────────────────────────────────────────
  web:
    <<: *orbit-common
    command: web
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "/app/scripts/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ── Celery Worker ───────────────────────────────────────────────
  worker:
    <<: *orbit-common
    command: worker
    depends_on:
      web:
        condition: service_healthy

  # ── Celery Beat Scheduler ───────────────────────────────────────
  beat:
    <<: *orbit-common
    command: beat
    depends_on:
      worker:
        condition: service_started

  # ── Nginx Reverse Proxy ─────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/orbit.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/static:/static:ro
      - nginx_logs:/var/log/nginx
      # Uncomment and set real cert path for production TLS:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
    networks:
      - orbit-net

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

networks:
  orbit-net:
    driver: bridge
