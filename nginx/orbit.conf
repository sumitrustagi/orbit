# ════════════════════════════════════════════════════════════════
# Orbit — Nginx Reverse Proxy Configuration
# ════════════════════════════════════════════════════════════════

upstream orbit_app {
    server web:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name orbit.yourcompany.com;

    # TLS — replace with your real cert paths
    ssl_certificate     /etc/letsencrypt/live/orbit.yourcompany.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orbit.yourcompany.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN                             always;
    add_header X-Content-Type-Options    nosniff                                always;
    add_header Referrer-Policy           strict-origin-when-cross-origin        always;

    # Static files served directly
    location /static/ {
        alias /static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Favicon
    location = /favicon.ico {
        alias /static/favicon.ico;
        access_log off;
        log_not_found off;
    }

    # Proxy everything else to Gunicorn
    location / {
        proxy_pass         http://orbit_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;

        client_max_body_size  16M;
    }

    # Webhook endpoint — allow large payloads from SNOW
    location /api/webhook/ {
        proxy_pass         http://orbit_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 4M;
    }

    # Health check — no logging
    location = /health {
        proxy_pass http://orbit_app;
        access_log off;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log  /var/log/nginx/orbit_access.log;
    error_log   /var/log/nginx/orbit_error.log warn;
}
